name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy (attempt 1)
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true
        timeout-minutes: 5

      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 30

      - name: Deploy (attempt 2)
        id: deploy2
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        timeout-minutes: 5

      - name: Wait before final retry
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy (attempt 3)
        id: deploy3
        if: steps.deploy.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        timeout-minutes: 5

      - name: Verify deployment succeeded
        run: |
          if [ "${{ steps.deploy.outcome }}" != "success" ] && \
             [ "${{ steps.deploy2.outcome }}" != "success" ] && \
             [ "${{ steps.deploy3.outcome }}" != "success" ]; then
            echo "::error::GitHub Pages deployment failed after 3 attempts. Check https://www.githubstatus.com"
            exit 1
          fi
          echo "Deployment succeeded."
